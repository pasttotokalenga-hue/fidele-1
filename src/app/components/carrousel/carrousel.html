<div class="flex items-center justify-center relative w-11/12 h-96 mx-auto overflow-hidden rounded-2xl shadow-lg">
  <div #carousel class="flex transition-transform duration-500 ease-in-out w-full h-full">
    <img src="https://picsum.photos/id/1015/1600/400" class="w-full h-full object-cover shrink-0" alt="Image 1">
    <img src="https://picsum.photos/id/1016/1600/400" class="w-full h-full object-cover shrink-0" alt="Image 2">
    <img src="https://picsum.photos/id/1018/1600/400" class="w-full h-full object-cover shrink-0" alt="Image 3">
  </div>

  <button (click)="prevSlide()" class="absolute top-1/2 left-4 -translate-y-1/2 bg-white p-2 rounded-full shadow hover:bg-gray-200">
    ◀
  </button>
  <button (click)="nextSlide()" class="absolute top-1/2 right-4 -translate-y-1/2 bg-white p-2 rounded-full shadow hover:bg-gray-200">
    ▶
  </button>
</div>
