<header class="fixed top-0 left-0 right-0 h-20 bg-[#f6f6f5] flex justify-between items-center z-50">
    
        <div class="flex flex-row space-x-10 mx-3 ">
            <a routerLink='' class="cursor-pointer"><img src="zando+_logo.png" alt="logo" class=" m-4 p-2 cursor-pointer h-20 w-20 " ></a>
            
        </div>

        <div class="flex flex-row space-x-10 mx-8 text-white items-center">

          


            <!--Nav options-->
           <nav class="space-x-8">
  <ul class="flex flex-row space-x-8 text-base">
    <!-- Cart Icon -->
    

<li>
  <a 
    routerLink="cart" 
    class="hover:bg-[#009687] hover:text-black p-4 rounded-lg flex items-center relative"
  >
    <!-- Shopping Cart Icon -->
    <img 
      src="https://cdn-icons-png.flaticon.com/128/1170/1170678.png" 
      alt="menu icon" 
      class="h-10 w-10"
    />

    <!-- Badge using Angular @if -->
    
    @if(basketStates().length == 0){

    }  @else {

       <span 
        class="absolute top-2 right-2 bg-[#009687] text-white text-xs font-bold rounded-full h-6 w-6 flex items-center justify-center"
      >
        {{basketStates().length}}
      </span>

    }
   
    
  </a>
</li>














    <!-- Truck Icon -->
    <li>
      <a routerLink="delivery" class="hover:bg-[#009687] hover:text-black p-4 rounded-lg flex items-center">
        <!-- favorite Icon -->
        <img 
    src="https://cdn-icons-png.flaticon.com/128/4519/4519233.png" 
    alt="menu icon" 
    class="h-10 w-10"
  />
      </a>
    </li>

    <li>
      <a routerLink="delivery" class="hover:bg-[#009687] hover:text-black p-4 rounded-lg flex items-center">
        <!-- bell Icon -->
        <img 
    src="https://cdn-icons-png.flaticon.com/128/4991/4991422.png" 
    alt="menu icon" 
    class="h-8 w-8"
  />
      </a>
    </li>

    <li>
      <a routerLink="delivery" class="hover:bg-[#009687] hover:text-black p-4 rounded-lg flex items-center">
        <!-- favoritz Icon -->
        <img 
    src="https://cdn-icons-png.flaticon.com/128/535/535285.png" 
    alt="menu icon" 
    class="h-8 w-8"
  />
      </a>
    </li>

  </ul>
</nav>





            
          <div class="flex items-center space-x-4">

  <!-- profil-->

   <div class="relative inline-block text left">

  <div class="flex items-center space-x-2 cursor-pointer" (click)="toggleDropdown()">
    <span *ngIf="authService.currentUser()" class="text-black font-medium">{{ authService.currentUser()?.name }}</span>
    <img src="user.png" 
         alt="User Avatar" 
         class="w-12 h-12 rounded-full object-cover border border-gray-300">
  </div>

       <!-- menu deroulant-->
 
       @if (dropdownOpen) {
  <div class="absolute right-0 mt-2 w-48 bg-white border border-gray-200 rounded-md shadow-lg z-50 ">
    <ul class="py-2">
      <li *ngIf="authService.isLoggedIn()">
        <a routerLink="profile" class="block px-4 py-2 text-sm text-gray-700 hover:bg-black hover:text-white">
          Mon compte
        </a>
      </li>
      <li *ngIf="authService.isLoggedIn()">
        <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-black hover:text-white">
          Paramètres
        </a>
      </li>
      <li *ngIf="authService.isLoggedIn()">
        <a (click)="logout()" class="block px-4 py-2 text-sm text-gray-700 hover:bg-black hover:text-white cursor-pointer">
          Déconnexion
        </a>
      </li>
      <li *ngIf="!authService.isLoggedIn()">
        <a routerLink="login" (click)="dropdownOpen = false" class="block px-4 py-2 text-sm text-gray-700 hover:bg-black hover:text-white">
          Se connecter
        </a>
      </li>
    </ul>
  </div>
}

    



    </div>


</div>




        </div>
    
</header>
