<div class="flex items-center justify-center h-screen bg-[#e0e0e0]">
  
  <!-- Wrapper with fixed max width -->
  <div class="flex items-stretch w-3/4">
    
    <!-- Left image (slightly wider) -->
    <div class="flex items-center justify-center w-2/3 bg-white rounded-l-lg">
      <img src="zando+.png" alt="zando+ customer" class="h-full object-contain w-full">
    </div>

    <!-- Right form -->
    <div class="w-1/3 flex items-center justify-center bg-[#f6f6f5] rounded-r-lg shadow-lg">
      <div class="w-full max-w-md p-8">
        <h2 class="text-2xl font-bold text-center mb-6">S'inscrire</h2>
        
        <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
          <!-- Error Message -->
          <div *ngIf="errorMessage()" class="mb-4 p-2 bg-red-100 text-red-600 text-sm rounded-lg text-center">
            {{ errorMessage() }}
          </div>

          <!-- Name -->
          <div class="mb-4">
            <label for="name" class="block text-sm font-medium text-gray-700">Nom complet</label>
            <input type="text" id="name" formControlName="name"
              class="mt-1 bg-white h-10 block w-full rounded-lg shadow-sm focus:border-[#009687] focus:ring-[#009687] sm:text-sm px-3" 
              placeholder="Votre nom">
          </div>

          <!-- Email -->
          <div class="mb-4">
            <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
            <input type="email" id="email" formControlName="email"
              class="mt-1 bg-white h-10 block w-full rounded-lg shadow-sm focus:border-[#009687] focus:ring-[#009687] sm:text-sm px-3" 
              placeholder="exemple@email.com">
          </div>

          <!-- Password -->
          <div class="mb-4">
            <label for="password" class="block text-sm font-medium text-gray-700">Mot de passe</label>
            <input type="password" id="password" formControlName="password"
              class="mt-1 bg-white h-10 block w-full rounded-lg shadow-sm focus:border-[#009687] focus:ring-[#009687] sm:text-sm px-3" 
              placeholder="••••••••">
          </div>

          <!-- Confirm Password -->
          <div class="mb-6">
            <label for="confirmPassword" class="block text-sm font-medium text-gray-700">Confirmer le mot de passe</label>
            <input type="password" id="confirmPassword" formControlName="confirmPassword"
              class="mt-1 bg-white h-10 block w-full rounded-lg shadow-sm focus:border-[#009687] focus:ring-[#009687] sm:text-sm px-3" 
              placeholder="••••••••">
            <div *ngIf="signupForm.hasError('mismatch') && signupForm.get('confirmPassword')?.touched" class="text-red-500 text-xs mt-1">
              Les mots de passe ne correspondent pas.
            </div>
          </div>

          <!-- Signup button -->
          <button type="submit" [disabled]="signupForm.invalid"
            class="w-full bg-[#009687] text-white py-2 px-4 rounded-md hover:bg-[#00796b] transition disabled:opacity-50">
            S'inscrire
          </button>
        </form>

        <!-- Login link -->
        <p class="mt-6 text-center text-sm text-gray-600">
          Vous avez déjà un compte? 
          <a routerLink="/login" class="text-[#009687] hover:underline">Se connecter</a>
        </p>
      </div>
    </div>

  </div>
</div>
