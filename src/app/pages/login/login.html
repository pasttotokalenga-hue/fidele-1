
<div class="flex items-center justify-center h-screen bg-[#e0e0e0]">
  
  <!-- Wrapper with fixed max width -->
  <div class="flex items-stretch w-3/4">
    
    <!-- Left image (slightly wider) -->
    <div class="flex items-center justify-center w-2/3 bg-white rounded-l-lg">
      <img src="zando+.png" alt="zando+ customer" class="h-full object-contain w-full">
    </div>

    <!-- Right form -->
    <div class="w-1/3 flex items-center justify-center bg-[#f6f6f5] rounded-r-lg shadow-lg">
      <div class="w-full max-w-md p-8">
        <h2 class="text-2xl font-bold text-center mb-6">Se connecter</h2>
        <!-- Form content here -->
         <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <!-- Error Message -->
          <div *ngIf="errorMessage()" class="mb-4 p-2 bg-red-100 text-red-600 text-sm rounded-lg text-center">
            {{ errorMessage() }}
          </div>

          <!-- Email -->
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
            <input type="email" id="email" formControlName="email"
              class="mt-1 bg-white h-10 block w-full rounded-lg shadow-sm focus:border-[#009687] focus:ring-[#009687] sm:text-sm px-3" 
              placeholder="exemple@email.com">
          </div>

          
          <div>
            <label for="password" class="block my-2 text-sm font-medium text-gray-700">Mot de passe</label>
            <input type="password" id="password" formControlName="password"
              class="mt-1 bg-white mb-6 h-10 block w-full rounded-lg shadow-sm focus:border-[#009687] focus:ring-[#009687] sm:text-sm px-3" 
              placeholder="••••••••">
          </div>
     

          <!-- Forgot password -->
          <div class="text-right my-5">
            <a routerLink="" class="text-sm text-indigo-600 hover:underline">Mot de passe oublié?</a>
          </div>

          <!-- Login button -->
          <button type="submit" [disabled]="loginForm.invalid"
            class="w-full bg-[#009687] text-white py-2 px-4 rounded-md hover:bg-[#00796b] transition disabled:opacity-50">
            Se connecter
          </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center my-6">
          <div class="grow border-t border-gray-300"></div>
          <span class="mx-2 text-gray-500 text-sm">ou</span>
          <div class="grow border-t border-gray-300"></div>
        </div>

        <!-- Social login -->
        <div class="space-y-3">
          <button class="w-full flex items-center justify-center border border-gray-300 rounded-md py-2 hover:bg-gray-50">
            <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5 h-5 mr-2" alt="Google"> Se connecter avec Google
          </button>
          <button class="w-full flex items-center justify-center border border-gray-300 rounded-md py-2 hover:bg-gray-50">
            <img src="https://www.svgrepo.com/show/508866/os-apple.svg" class="w-5 h-5 mr-2" alt="Apple"> Se connecter avec Apple
          </button>
          <button class="w-full flex items-center justify-center border border-gray-300 rounded-md py-2 hover:bg-gray-50">
            <img src="https://www.svgrepo.com/show/475647/facebook-color.svg" class="w-5 h-5 mr-2" alt="Facebook"> Se connecter avec Facebook
          </button>
        </div>

        <!-- Sign up -->
        <p class="mt-6 text-center text-sm text-gray-600">
          Vous n'avez pas de compte? 
          <a [routerLink]="['/signup']" class="text-[#009687] hover:underline">S’inscrire</a>
        </p>
      </div>
    </div>

  </div>
</div>
