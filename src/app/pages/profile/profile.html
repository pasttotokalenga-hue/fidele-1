<!-- Page wrapper -->
<div class="min-h-screen flex items-center justify-center bg-[#e0e0e0]">
  <!-- Profile Card -->
  <div class="max-w-md w-full bg-[#f6f6f5] shadow-md rounded-lg p-6 text-center">
    <!-- Avatar -->
    <img
      src="user.png"
      alt="Avatar"
      class="mx-auto rounded-full w-32 h-32 mb-4 border-4 border-indigo-500"
    />

    <!-- Nom -->
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 text-left">Nom</label>
      <input
        type="text"
        class="mt-1 block w-full bg-white rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
      />
    </div>

    <!-- Email -->
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 text-left">Email</label>
      <input
        type="email"
        class="mt-1 block w-full bg-white rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
      />
    </div>

    <!-- Localisation -->
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 text-left">Localisation</label>
      <input
        type="text"
        class="mt-1 block w-full bg-white rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
      />
    </div>

    <!-- Centres d’intérêt -->
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 text-left">Centres d’intérêt</label>
      <textarea
        class="mt-1 block w-full bg-white rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500"
      >UI/UX prototyping, Angular, Tailwind</textarea>
    </div>

    <!-- Boutons -->
    <div class="mt-6 flex justify-center space-x-2">
      <button
        class="px-4 py-2 bg-[#009687] text-white rounded-md hover:bg-indigo-700"
      >
        Enregistrer
      </button>
      <button
        class="px-4 py-2 bg-gray-300 text-gray-800 rounded-md hover:bg-gray-400"
      >
        Annuler
      </button>
    </div>
  </div>
</div>
